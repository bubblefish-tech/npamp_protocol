# MkDocs configuration for the N-PAMP reference documentation site.
#
# The spec surface is pure Markdown scattered across the repository root (spec/,
# spec/channels/, spec/companion/, decisions/, ietf/, harness/, impl/, test-vectors/),
# not under a single docs/ tree. Rather than move or symlink those canonical files,
# docs_dir is set to the repo root ('.') so every page is addressed at its real
# repo-relative path and stays browsable on GitHub. A hand-authored docs/index.md is
# the site landing page.
#
# Build with the pinned toolchain in requirements-docs.txt:
#     pip install -r requirements-docs.txt
#     mkdocs build --strict
#
# --strict promotes every `warn`-level validation message to a build error, so a
# green strict build proves the whole nav resolves and no in-page link is broken.

site_name: N-PAMP Protocol
site_description: >-
  Native Post-Quantum Agent Messaging Protocol — the public reference: Internet-Draft,
  core and companion specifications, code-point registries, ten reference
  implementations, conformance corpus and harness, and design decision records.
site_author: BubbleFish Technologies, Inc.
site_url: https://bubblefish-tech.github.io/npamp_protocol/

repo_name: bubblefish-tech/npamp_protocol
repo_url: https://github.com/bubblefish-tech/npamp_protocol
edit_uri: edit/main/

copyright: Copyright &copy; 2026 BubbleFish Technologies, Inc.

# The canonical Markdown lives across the repo root, so the root is the docs_dir.
# MkDocs normally forbids docs_dir == the config file's directory; the `same-dir`
# plugin (enabled under `plugins:` below) lifts that guard for exactly this layout.
# site_dir must sit OUTSIDE docs_dir, so it is placed one level up.
docs_dir: .
site_dir: ../site

# Constrain the build to exactly the navigated documentation surface. The repo root
# holds source trees for ten implementations, vendored SwiftPM/Cargo checkouts, the
# harness runners, tooling, registries, and VCS metadata — none of which are docs, and
# some of which (the vendored checkouts, README.md) contain relative links that only
# resolve on GitHub, not in the rendered site. Excluding them keeps `--strict` honest:
# it validates the pages we actually publish, not third-party or GitHub-only Markdown.
#
# Strategy: exclude broadly, then re-include (`!`) only the exact pages the nav uses.
# Patterns are .gitignore-style, evaluated in order (later wins); a leading '/' anchors
# to the docs_dir root. The default implicit excludes ('.*' and '/templates/') still
# apply, so dotfiles like .github never enter the build.
exclude_docs: |
  # Non-documentation trees at the root.
  /site/
  /formal/
  /scripts/
  /registries/
  /schema/
  # The test-vector data (JSON vectors + their JSON Schemas) is not documentation; the
  # human-readable corpus README is re-included below for the Conformance section.
  /test-vectors/**
  /harness/adapters/
  /harness/runner/
  # Every implementation subtree (source, vendored checkouts, packaging) — the docs
  # we keep from impl/ are re-included by name just below. Uses '/**' (all descendants)
  # rather than '/impl/' (the directory) so gitignore semantics still allow the '!'
  # re-includes below to match — a file cannot be re-included if its parent directory
  # itself is excluded.
  /impl/**
  # Root governance / meta / GitHub-only Markdown that is not part of the doc nav and
  # whose relative links target directories or non-Markdown files.
  /README.md
  /CHANGELOG.md
  /CONTRIBUTING.md
  /SECURITY.md
  /CODE_OF_CONDUCT.md
  /TRADEMARKS.md
  /LINEAGE.md
  /IANA_ALPN_n-pamp-2_registration_request.md
  # Re-include the human-readable conformance corpus README (its sibling JSON data
  # stays excluded).
  !/test-vectors/README.md
  # Re-include the exact implementation pages the nav publishes.
  !/impl/README.md
  !/impl/go/QUICKSTART.md
  !/impl/go/sdk/QUICKSTART.md
  !/impl/rust/QUICKSTART.md
  !/impl/python/QUICKSTART.md
  !/impl/typescript/QUICKSTART.md
  !/impl/csharp/QUICKSTART.md
  !/impl/swift/QUICKSTART.md
  !/impl/java/QUICKSTART.md
  !/impl/kotlin/QUICKSTART.md
  !/impl/php/QUICKSTART.md
  !/impl/ruby/QUICKSTART.md

# --strict turns each `warn` below into a hard error. `omitted_files: info` because
# the repo intentionally contains many Markdown files outside the doc nav; every other
# check stays at `warn` so broken links, missing files, and bad relative links fail CI.
validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: info
    absolute_links: ignore
    unrecognized_links: warn

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  # `same-dir` permits docs_dir: . (config file co-located with the docs at the repo
  # root); without it MkDocs aborts with a "docs_dir is the parent of the config"
  # configuration error. It must load before other plugins that read the file tree.
  - same-dir
  - search

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

