# Build the MkDocs documentation site (mkdocs.yml + requirements-docs.txt) and deploy
# it to GitHub Pages.
#
# The build runs `mkdocs build --strict`, which promotes every link/nav validation
# warning to an error — so this workflow also serves as a link-integrity gate for the
# navigated documentation surface, not just a publisher.
#
# NOTE: deployment only succeeds once GitHub Pages is enabled for the repository with
# "GitHub Actions" as the source (Settings -> Pages -> Build and deployment -> Source:
# GitHub Actions). Until then the build job still runs and gates links on every push;
# only the deploy job needs Pages enabled.
#
# Action majors verified against their GitHub release pages on 2026-07-12:
# actions/checkout@v7, actions/setup-python@v6, actions/configure-pages@v6,
# actions/upload-pages-artifact@v5, actions/deploy-pages@v5.
name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: the build job needs only read; the deploy job additionally needs
# pages:write and id-token:write for the OIDC-authenticated Pages deployment.
permissions:
  contents: read

# Allow only one concurrent Pages deployment; do not cancel an in-progress run so a
# started deployment completes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build (mkdocs build --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install docs toolchain
        run: python -m pip install -r requirements-docs.txt
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6
      # docs_dir is the repo root ('.'), so site_dir cannot live inside it; build to a
      # directory under the runner temp instead, then hand that path to the uploader.
      # --strict turns every nav/link validation warning into a build failure.
      - name: Build site (strict)
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
        run: mkdocs build --strict --site-dir "${RUNNER_TEMP}/site"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
